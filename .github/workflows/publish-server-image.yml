name: Publish Server Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - cuda-11-builder-support
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Server image CUDA ${{ matrix.cuda }} / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: 13.1.0
            ubuntu: "24.04"
          - cuda: 13.0.2
            ubuntu: "24.04"
          - cuda: 12.9.1
            ubuntu: "24.04"
          - cuda: 12.8.1
            ubuntu: "24.04"
          - cuda: 12.6.2
            ubuntu: "24.04"
          - cuda: 12.5.1
            ubuntu: "22.04"
          - cuda: 12.4.1
            ubuntu: "22.04"
          - cuda: 11.8.0
            ubuntu: "22.04"
          - cuda: 11.7.1
            ubuntu: "22.04"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda }}
            UBUNTU_VERSION=${{ matrix.ubuntu }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/scuda-server:cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
