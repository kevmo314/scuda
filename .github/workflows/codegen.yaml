name: Codegen Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codegen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run codegen in CUDA builder
        run: |
          docker build \
            -f Dockerfile \
            --target builder \
            --build-arg RUN_CODEGEN=1 \
            --build-arg CUDA_VERSION=13.1.0 \
            --build-arg UBUNTU_VERSION=24.04 \
            -t lupine-codegen:test \
            .
