name: Build CUDA Matrix

on:
  pull_request:
  push:
    branches:
      - main
      - cuda-11-builder-support
  workflow_dispatch:

jobs:
  build:
    name: CUDA ${{ matrix.cuda }} / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: 13.1.0
            ubuntu: "24.04"
          - cuda: 13.0.2
            ubuntu: "24.04"
          - cuda: 12.9.1
            ubuntu: "24.04"
          - cuda: 12.8.1
            ubuntu: "24.04"
          - cuda: 12.6.2
            ubuntu: "24.04"
          - cuda: 12.5.1
            ubuntu: "22.04"
          - cuda: 12.4.1
            ubuntu: "22.04"
          - cuda: 11.8.0
            ubuntu: "22.04"
          - cuda: 11.7.1
            ubuntu: "22.04"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build client and server
        run: |
          docker build \
            -f Dockerfile.build \
            --build-arg CUDA_VERSION="${{ matrix.cuda }}" \
            --build-arg UBUNTU_VERSION="${{ matrix.ubuntu }}" \
            -t "scuda-builder:cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}" \
            .

      - name: Verify build artifacts
        run: |
          docker run --rm "scuda-builder:cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}" \
            bash -lc '
              set -euo pipefail
              test -x /opt/scuda/build/scuda_driver_server
              test -e /opt/scuda/build/libcuda.so.1
              ! nm -D --defined-only /opt/scuda/build/libcuda.so.1 \
                | awk "{print \$3}" \
                | grep -E "^cuda"
            '

      - name: Collect release artifacts
        run: |
          set -euo pipefail
          image="scuda-builder:cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}"
          out="artifacts/scuda-cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}-x86_64"
          mkdir -p "$out"

          container="$(docker create "$image")"
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT

          docker cp "$container:/opt/scuda/build/scuda_driver_server" "$out/scuda_driver_server"
          docker cp "$container:/opt/scuda/build/libcuda.so.1" "$out/libcuda.so.1"
          cp "$out/libcuda.so.1" "$out/libcuda.so"
          chmod +x "$out/scuda_driver_server"
          (cd "$out" && sha256sum libcuda.so libcuda.so.1 scuda_driver_server > SHA256SUMS)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scuda-cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}-x86_64
          path: artifacts/scuda-cuda-${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}-x86_64/
          if-no-files-found: error
